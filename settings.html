<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHOPMart - Settings</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // பக்கத்தை லோடு செய்யும் போதே டார்க் மோடு ஆன்-இல் உள்ளதா என்று சோதிக்கும் மாற்று வழி
        if (localStorage.getItem('darkMode') === 'enabled') {
            document.documentElement.classList.add('dark');
        }
        
        // டெயில்விண்ட் சிஎஸ்எஸ்-இல் டார்க் மோடு வேலை செய்ய இதை எனேபிள் செய்ய வேண்டும்
        tailwind.config = {
            darkMode: 'class'
        }
    </script>
</head>
<body class="bg-gray-100 dark:bg-gray-900 min-h-screen font-sans flex transition-colors duration-200">

    <aside class="w-64 bg-green-800 dark:bg-green-950 text-white flex flex-col shadow-xl fixed h-full z-10">
        <div class="p-5 text-2xl font-bold border-b border-green-700 dark:border-green-800 flex items-center gap-2">🛒 DMart ERP</div>
        <nav class="flex-1 p-4 space-y-2">
            <a href="index.html" class="block py-2.5 px-4 rounded hover:bg-green-700 font-bold transition">Dashboard</a>
            <a href="billing.html" class="block py-2.5 px-4 rounded transition hover:bg-green-700 opacity-75">POS Billing</a>
            <a href="invoice.html" class="block py-2.5 px-4 rounded transition hover:bg-green-700 opacity-75">Invoice History</a>
            <a href="products.html" class="block py-2.5 px-4 rounded transition hover:bg-green-700 opacity-75">Product Inventory</a>
            
            <a href="suppliers.html" class="block py-2.5 px-4 rounded transition hover:bg-green-700 opacity-75"> Suppliers List</a>
            
            <a href="reports.html" class="block py-2.5 px-4 rounded transition hover:bg-green-700 opacity-75"> Analytics Reports</a>
            <a href="settings.html" class="block py-2.5 px-4 rounded transition bg-green-900 opacity-75"> Analytics Reports</a>
        </nav>
    </aside>

    <div class="flex-1 ml-64 flex flex-col min-h-screen">
        <header class="bg-white dark:bg-gray-800 p-4 shadow-sm border-b dark:border-gray-700 flex justify-between items-center transition-colors duration-200">
            <h1 class="text-xl font-bold text-gray-800 dark:text-white">ERP System Settings</h1>
            
            <button onclick="toggleDarkMode()" class="bg-gray-200 dark:bg-gray-700 text-gray-800 dark:text-yellow-400 font-bold py-2 px-4 rounded-lg shadow transition-all duration-200 flex items-center gap-2">
                <span id="theme-icon">🌙</span> <span id="theme-text">Dark Mode</span>
            </button>
        </header>

        <main class="p-6 max-w-3xl w-full mx-auto flex-1 flex flex-col">
            <div class="bg-white dark:bg-gray-800 p-6 rounded-xl shadow-md border border-gray-200 dark:border-gray-700 transition-colors duration-200">
                <h2 class="text-lg font-bold text-gray-700 dark:text-gray-200 mb-4 flex items-center gap-2">🏢 Store Profile Details</h2>
                <hr class="mb-5 dark:border-gray-700">

                <form id="settings-form" onsubmit="saveSettings(event)" class="space-y-5">
                    
                    <div>
                        <label class="block text-xs font-bold text-gray-600 dark:text-gray-400 uppercase mb-1">Store Name</label>
                        <input type="text" id="store-name" required
                               class="w-full p-3 border border-gray-300 dark:border-gray-600 rounded-lg text-sm bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:border-green-600 dark:focus:border-green-500 focus:outline-none focus:ring-1 focus:ring-green-600 shadow-sm"
                               placeholder="e.g., SHOPMart Supermarket">
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-gray-600 dark:text-gray-400 uppercase mb-1">Store Address</label>
                        <textarea id="store-address" rows="3" required
                                  class="w-full p-3 border border-gray-300 dark:border-gray-600 rounded-lg text-sm bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:border-green-600 dark:focus:border-green-500 focus:outline-none focus:ring-1 focus:ring-green-600 shadow-sm"
                                  placeholder="e.g., No: 12, Main Bazaar Street, Chennai - 600001"></textarea>
                    </div>

                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-bold text-gray-600 dark:text-gray-400 uppercase mb-1">Phone Number</label>
                            <input type="tel" id="store-phone" required pattern="[0-9]{10,12}"
                                   class="w-full p-3 border border-gray-300 dark:border-gray-600 rounded-lg text-sm bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:border-green-600 dark:focus:border-green-500 focus:outline-none focus:ring-1 focus:ring-green-600 shadow-sm"
                                   placeholder="e.g., 9876543210">
                        </div>
                        
                        <div>
                            <label class="block text-xs font-bold text-gray-600 dark:text-gray-400 uppercase mb-1">GST Number (GSTIN)</label>
                            <input type="text" id="store-gst" required maxlength="15"
                                   class="w-full p-3 border border-gray-300 dark:border-gray-600 rounded-lg text-sm bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:border-green-600 dark:focus:border-green-500 focus:outline-none focus:ring-1 focus:ring-green-600 shadow-sm font-mono uppercase"
                                   placeholder="e.g., 33AAAAA1111A1Z1">
                        </div>
                    </div>

                    <div class="flex justify-end gap-3 pt-4 border-t dark:border-gray-700">
                        <button type="submit" class="px-6 py-3 bg-green-600 hover:bg-green-700 text-white rounded-lg text-sm font-bold shadow-md transition duration-150 transform active:scale-95">
                            💾 Save Store Configurations
                        </button>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            loadStoredSettings();
            updateThemeButtonUI();
        });

        // லோக்கல் ஸ்டோரேஜில் இருந்து டேட்டாவை எடுத்து படிவத்தில் நிரப்புதல்
        function loadStoredSettings() {
            const storeConfig = JSON.parse(localStorage.getItem('storeConfig')) || {
                name: "DMart Retail",
                address: "Chennai, Tamil Nadu, India",
                phone: "9876543210",
                gst: "33AAAAA1111A1Z1"
            };

            document.getElementById('store-name').value = storeConfig.name;
            document.getElementById('store-address').value = storeConfig.address;
            document.getElementById('store-phone').value = storeConfig.phone;
            document.getElementById('store-gst').value = storeConfig.gst;
        }

        // படிவத்தை சப்மிட் செய்யும்போது லோக்கல் ஸ்டோரேஜில் சேமிக்கும் செயல்பாடு
        function saveSettings(event) {
            event.preventDefault();
            
            const storeConfig = {
                name: document.getElementById('store-name').value.trim(),
                address: document.getElementById('store-address').value.trim(),
                phone: document.getElementById('store-phone').value.trim(),
                gst: document.getElementById('store-gst').value.trim().toUpperCase()
            };

            localStorage.setItem('storeConfig', JSON.stringify(storeConfig));
            alert("✨ Store Profile and Configurations Saved Successfully!");
        }

        // 🌗 DARK MODE TOGGLE LOGIC
        function toggleDarkMode() {
            const htmlElement = document.documentElement;
            
            if (htmlElement.classList.contains('dark')) {
                htmlElement.classList.remove('dark');
                localStorage.setItem('darkMode', 'disabled');
            } else {
                htmlElement.classList.add('dark');
                localStorage.setItem('darkMode', 'enabled');
            }
            updateThemeButtonUI();
        }

        // தீம் பட்டனின் உரை மற்றும் ஐகானை மாற்றும் செயல்பாடு
        function updateThemeButtonUI() {
            const isDark = document.documentElement.classList.contains('dark');
            const icon = document.getElementById('theme-icon');
            const text = document.getElementById('theme-text');
            
            if (icon && text) {
                icon.innerText = isDark ? "☀️" : "🌙";
                text.innerText = isDark ? "Light Mode" : "Dark Mode";
            }
        }
    </script>
</body>
</html>
