<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHOPMart - Supplier Directory</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen font-sans flex">

    <aside class="w-64 bg-green-800 text-white flex flex-col shadow-xl fixed h-full z-10">
        <div class="p-5 text-2xl font-bold border-b border-green-700 flex items-center gap-2">🛒 SHOPMart ERP</div>
        <nav class="flex-1 p-4 space-y-2">
            <a href="index.html" class="block py-2.5 px-4 rounded hover:bg-green-700 font-bold transition">Dashboard</a>
            <a href="billing.html" class="block py-2.5 px-4 rounded transition hover:bg-green-700 opacity-75">POS Billing</a>
            <a href="invoice.html" class="block py-2.5 px-4 rounded transition hover:bg-green-700 opacity-75">Invoice History</a>
            <a href="products.html" class="block py-2.5 px-4 rounded transition hover:bg-green-700 opacity-75">Product Inventory</a>
            
            <a href="suppliers.html" class="block py-2.5 px-4 rounded transition bg-green-900 opacity-75"> Suppliers List</a>
            
            <a href="reports.html" class="block py-2.5 px-4 rounded transition hover:bg-green-700 opacity-75"> Analytics Reports</a>
            <a href="settings.html" class="block py-2.5 px-4 rounded transition hover:bg-green-700 opacity-75"> Analytics Reports</a>
        </nav>
    </aside>

    <div class="flex-1 ml-64 flex flex-col min-h-screen">
        
        <header class="bg-white p-4 shadow-sm border-b flex justify-between items-center">
            <h1 class="text-xl font-bold text-gray-800">🚚 Suppliers Management</h1>
            <div class="text-sm text-gray-500 font-medium">SHOPMart Supermarket</div>
        </header>

        <main class="p-6 max-w-7xl w-full mx-auto grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-200 h-fit">
                <h2 class="text-lg font-bold text-gray-700 mb-4 flex items-center gap-2">➕ Add New Supplier</h2>
                
                <form id="add-supplier-form" class="space-y-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Supplier / Agency Name</label>
                        <input type="text" id="s-name" placeholder="e.g., Raja Agencies" class="w-full p-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-green-500 outline-none" required>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Contact Phone Number</label>
                        <input type="tel" id="s-phone" placeholder="e.g., 9876543210" maxlength="10" class="w-full p-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-green-500 outline-none" required>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Supply Category</label>
                        <input type="text" id="s-category" placeholder="e.g., Groceries, Cosmetics, Dairy" class="w-full p-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-green-500 outline-none" required>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">City / Address (Optional)</label>
                        <input type="text" id="s-address" placeholder="e.g., Chennai" class="w-full p-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-green-500 outline-none">
                    </div>

                    <button type="submit" class="w-full bg-green-700 hover:bg-green-800 text-white font-bold py-2 px-4 rounded-lg text-sm transition shadow mt-2">
                        🤝 Save Supplier
                    </button>
                </form>
            </div>

            <div class="lg:grid-cols-1 lg:col-span-2 bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                
                <div class="p-4 bg-gray-50 border-b flex flex-col sm:flex-row justify-between items-center gap-3">
                    <h2 class="font-bold text-gray-700">📜 Active Suppliers Directory</h2>
                    <input type="text" id="supplier-search" placeholder="🔍 Search supplier name or category..." class="w-full sm:w-64 p-2 border border-gray-300 rounded-lg text-xs outline-none focus:ring-2 focus:ring-green-500 bg-white">
                </div>

                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-gray-100 text-gray-600 uppercase text-xs tracking-wider border-b">
                                <th class="p-4">ID</th>
                                <th class="p-4">Supplier Name</th>
                                <th class="p-4">Phone Number</th>
                                <th class="p-4">Category</th>
                                <th class="p-4">Location</th>
                                <th class="p-4 text-center">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="supplier-table-body" class="divide-y divide-gray-200 text-sm text-gray-700">
                            </tbody>
                    </table>
                </div>
            </div>

        </main>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            refreshSupplierTable();

            // சப்ளையர் ஃபார்ம் சப்மிட் ஹேண்ட்லர்
            document.getElementById("add-supplier-form").addEventListener("submit", handleSupplierSubmit);

            // லைவ் சர்ச் (Search) வசதி
            document.getElementById("supplier-search").addEventListener("input", function() {
                const query = this.value.toLowerCase().trim();
                refreshSupplierTable(query);
            });
        });

        // 1. புதிய சப்ளையரைச் சேமிக்கும் ஃபங்க்ஷன்
        function handleSupplierSubmit(event) {
            event.preventDefault();
            
            const name = document.getElementById("s-name").value.trim();
            const phone = document.getElementById("s-phone").value.trim();
            const category = document.getElementById("s-category").value.trim();
            const address = document.getElementById("s-address").value.trim() || "N/A";

            if (phone.length < 10 || isNaN(phone)) {
                alert("❌ Please Enter 10 Digit Number!");
                return;
            }

            let suppliers = JSON.parse(localStorage.getItem("all_suppliers")) || [];

            // ஒரே பெயரில் டூப்ளிகேட் வராமல் தடுக்கிறோம்
            if (suppliers.some(s => s.name.toLowerCase() === name.toLowerCase())) {
                alert("⚠️ இந்த சப்ளையர் ஏற்கனவே பட்டியலில் உள்ளார்!");
                return;
            }

            // புதிய சப்ளையர் ஆப்ஜெக்ட்
            const newSupplier = {
                id: "SUP" + Math.floor(100 + Math.random() * 900),
                name: name,
                phone: phone,
                category: category,
                address: address
            };

            suppliers.unshift(newSupplier); // புதிய சப்ளையரை முதலில் சேர்க்கிறோம்
            localStorage.setItem("all_suppliers", JSON.stringify(suppliers));

            alert(`🎉 Supplier "${name}" வெற்றிகரமாகச் சேர்க்கப்பட்டார்!`);
            document.getElementById("add-supplier-form").reset();
            refreshSupplierTable();
        }

        // 2. சப்ளையர் டேபிளை ரெண்டர் / புதுப்பிக்கும் ஃபங்க்ஷன்
        function refreshSupplierTable(filterQuery = "") {
            const tbody = document.getElementById("supplier-table-body");
            if (!tbody) return;

            tbody.innerHTML = "";
            const suppliers = JSON.parse(localStorage.getItem("all_suppliers")) || [];

            // ஃபில்டர் செய்கிறோம் (தேடலின் போது)
            const filteredSuppliers = suppliers.filter(sup => {
                const matchName = sup.name.toLowerCase().includes(filterQuery);
                const matchCategory = sup.category.toLowerCase().includes(filterQuery);
                return matchName || matchCategory;
            });

            if (filteredSuppliers.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" class="p-6 text-center text-gray-400">No suppliers found!</td></tr>`;
                return;
            }

            tbody.innerHTML = filteredSuppliers.map(sup => `
                <tr class="border-b hover:bg-gray-50 transition text-gray-800">
                    <td class="p-4 font-mono font-bold text-gray-500 text-xs">${sup.id}</td>
                    <td class="p-4 font-bold text-gray-900">${sup.name}</td>
                    <td class="p-4 font-mono text-blue-700 underline">
                        <a href="tel:${sup.phone}">📞 ${sup.phone}</a>
                    </td>
                    <td class="p-4">
                        <span class="bg-green-50 text-green-700 font-bold px-2.5 py-1 rounded text-xs uppercase tracking-wide border border-green-100">${sup.category}</span>
                    </td>
                    <td class="p-4 text-gray-500 text-xs">${sup.address}</td>
                    <td class="p-4 text-center">
                        <button onclick="deleteSupplier('${sup.id}')" class="bg-red-50 hover:bg-red-100 text-red-600 font-bold py-1 px-3 rounded text-xs transition border border-red-100">
                            Delete
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        // 3. சப்ளையரை நீக்கும் ஃபங்க்ஷன்
        function deleteSupplier(supId) {
            if (!confirm("Are You Sure you want to delete this supplier?")) return;

            let suppliers = JSON.parse(localStorage.getItem("all_suppliers")) || [];
            suppliers = suppliers.filter(s => s.id !== supId);
            localStorage.setItem("all_suppliers", JSON.stringify(suppliers));
            
            refreshSupplierTable();
        }
    </script>
</body>
</html>
